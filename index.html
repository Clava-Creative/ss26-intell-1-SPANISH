  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es-419\" xmlns=\"http://www.w3.org/1999/xhtml\" xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:o=\"urn:schemas-microsoft-com:office:office\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\">\n<meta name=\"x-apple-disable-message-reformatting\">\n<title>Slope Stability 2026 · Intelltech<\u002Ftitle>\n\n<!--[if mso]>\n<noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96<\u002Fo:PixelsPerInch><\u002Fo:OfficeDocumentSettings><\u002Fxml><\u002Fnoscript>\n<![endif]-->\n<style>\n  /* Estilos que SÓ funcionam onde houver suporte (Gmail/Apple Mail).\n     Toda a base do email usa estilos inline — isto é só melhoria progressiva. */\n  body{margin:0;padding:0;}\n  img{border:0;outline:none;text-decoration:none;-ms-interpolation-mode:bicubic;}\n  table{border-collapse:collapse;}\n  a{text-decoration:none;}\n  @media only screen and (max-width:620px){\n    .wrap{width:100% !important;}\n    .px{padding-left:24px !important;padding-right:24px !important;}\n    .hero-title{font-size:52px !important;line-height:48px !important;}\n    .stack{display:block !important;width:100% !important;border-right:none !important;border-bottom:1px solid rgba(255,255,255,0.11) !important;}\n    .stack-last{border-bottom:none !important;}\n    .btn-a{display:block !important;text-align:center !important;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"margin:0;padding:0;background-color:#07211e;\">\n\n  <!-- preheader (texto de pré-visualização na caixa de entrada) -->\n  <div style=\"display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:#07211e;\">\n    Intelltech estará en Lima como patrocinadora estratégica del Slope Stability 2026 — del 26 al 29 de octubre, Lima Convention Center.\n    &nbsp;‌&nbsp;‌&nbsp;‌&nbsp;‌&nbsp;‌&nbsp;‌&nbsp;‌&nbsp;‌&nbsp;‌&nbsp;‌&nbsp;‌\n  <\u002Fdiv>\n\n  <!-- canvas externo -->\n  <table role=\"presentation\" width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"background-color:#07211e;\">\n    <tbody><tr>\n      <td align=\"center\" style=\"padding:0;\">\n\n        <!-- container 600px -->\n        <table role=\"presentation\" class=\"wrap\" width=\"600\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"width:600px;max-width:600px;background-color:#07211e;\">\n\n          <!-- ============ HEADER ============ -->\n          <tbody><tr>\n            <td class=\"px\" style=\"padding:22px 44px;border-bottom:1px solid rgba(255,255,255,0.11);\">\n              <table role=\"presentation\" width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n                <tbody><tr>\n                  <td align=\"left\" valign=\"middle\" style=\"vertical-align:middle;\">\n                    <img src=\"680d2a2e-2531-4b0f-a002-5409bef6fa4a\" width=\"98\" height=\"28\" alt=\"Slope Stability 2026\" style=\"display:block;height:28px;width:98px;\">\n                  <\u002Ftd>\n                  <td align=\"right\" valign=\"middle\" style=\"vertical-align:middle;\">\n                    <img src=\"b4c81103-b497-4f02-a36d-f2b5704c52e3\" width=\"90\" height=\"18\" alt=\"Intelltech\" style=\"display:block;height:18px;width:90px;\">\n                  <\u002Ftd>\n                <\u002Ftr>\n              <\u002Ftbody><\u002Ftable>\n            <\u002Ftd>\n          <\u002Ftr>\n\n          <!-- ============ HERO ============ -->\n          <tr>\n            <td class=\"px\" bgcolor=\"#0a2522\" style=\"padding:52px 44px 54px;background-color:#0a2522;\">\n              <p style=\"margin:0 0 20px;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#2fbfa6;\">26–29 de octubre · Lima, Perú<\u002Fp>\n              <h1 class=\"hero-title\" style=\"margin:0;font-family:'Arial Black',Arial,Helvetica,sans-serif;font-weight:900;font-size:64px;line-height:58px;letter-spacing:-1.5px;color:#ffffff;\">Slope<br>Stability<br>2026<\u002Fh1>\n              <!-- divisor âmbar -->\n              <table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"margin:28px 0;\">\n                <tbody><tr><td style=\"width:36px;height:3px;background-color:#e0913f;font-size:0;line-height:0;\">&nbsp;<\u002Ftd><\u002Ftr>\n              <\u002Ftbody><\u002Ftable>\n              <p style=\"margin:0;font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:27px;color:rgba(255,255,255,0.68);\">El Slope Stability se realiza cada dos años. Es el momento en que la geotecnia global se reúne para discutir lo que importa — <span style=\"color:rgba(255,255,255,0.9);\">los datos, las fallas, los límites de lo que sabemos y lo que aún necesitamos entender.<\u002Fspan> Este año, ese encuentro se realiza en Lima.<\u002Fp>\n            <\u002Ftd>\n          <\u002Ftr>\n\n          <!-- ============ FACTS ============ -->\n          <tr>\n            <td style=\"padding:0;border-top:1px solid rgba(255,255,255,0.11);border-bottom:1px solid rgba(255,255,255,0.11);\">\n              <table role=\"presentation\" width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n                <tbody><tr>\n                  <td class=\"stack\" width=\"33.33%\" valign=\"top\" style=\"padding:22px 28px;border-right:1px solid rgba(255,255,255,0.11);\">\n                    <p style=\"margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,0.38);\">Fecha<\u002Fp>\n                    <p style=\"margin:0;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:15px;color:#ffffff;\">26–29 oct 2026<br><span style=\"font-weight:normal;font-size:12px;color:rgba(255,255,255,0.66);\">Cuatro días<\u002Fspan><\u002Fp>\n                  <\u002Ftd>\n                  <td class=\"stack\" width=\"33.33%\" valign=\"top\" style=\"padding:22px 28px;border-right:1px solid rgba(255,255,255,0.11);\">\n                    <p style=\"margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,0.38);\">Lugar<\u002Fp>\n                    <p style=\"margin:0;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:15px;color:#ffffff;\">Lima Conv. Center<br><span style=\"font-weight:normal;font-size:12px;color:rgba(255,255,255,0.66);\">Lima, Perú<\u002Fspan><\u002Fp>\n                  <\u002Ftd>\n                  <td class=\"stack stack-last\" width=\"33.33%\" valign=\"top\" style=\"padding:22px 28px;\">\n                    <p style=\"margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,0.38);\">Frecuencia<\u002Fp>\n                    <p style=\"margin:0;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:15px;color:#ffffff;\">Bienal<br><span style=\"font-weight:normal;font-size:12px;color:rgba(255,255,255,0.66);\">El mayor evento de la disciplina<\u002Fspan><\u002Fp>\n                  <\u002Ftd>\n                <\u002Ftr>\n              <\u002Ftbody><\u002Ftable>\n            <\u002Ftd>\n          <\u002Ftr>\n\n          <!-- ============ BODY ============ -->\n          <tr>\n            <td class=\"px\" style=\"padding:40px 44px 44px;\">\n              <p style=\"margin:0 0 14px;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#2fbfa6;\">Patrocinadora estratégica<\u002Fp>\n              <h2 style=\"margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-weight:bold;font-size:22px;line-height:26px;letter-spacing:-0.3px;color:#ffffff;\">Intelltech estará presente en el Slope Stability 2026.<\u002Fh2>\n              <p style=\"margin:0;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:26px;color:rgba(25
